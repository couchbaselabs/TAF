# JWT OIDC Authentication Tests with Keycloak IdP
#
# Non-secret settings may be passed as test params below.
# Secrets must be provided via Jenkins credentials -> environment variables (see class docstring
# in pytests/security/jwt_oidc_test.py) or -p for local runs only.
#
# Required environment variables (Jenkins credential ID suggestions in parentheses):
#   KEYCLOAK_IDP_IP                    (taf-keycloak-idp-ip) - optional if using default lab IP in code
#   KEYCLOAK_IDP_CLIENT_SECRET         (taf-keycloak-cb-client-secret)
#   KEYCLOAK_TEST_USER_PASSWORD        (taf-keycloak-test-user-password)
#   KEYCLOAK_TTL_CLIENT_SECRET         (taf-keycloak-ttl-client-secret)
#   KEYCLOAK_ROTATION_CLIENT_SECRET    (taf-keycloak-rotation-client-secret)
#   KEYCLOAK_ADMIN_PASSWORD            (taf-keycloak-admin-password)
#   KEYCLOAK_SSH_PASSWORD              (taf-keycloak-ssh-password) - needed only if Keycloak needs auto-restart

security.jwt_oidc_test.JWTOIDCTest:

    test_oidc_disable_preserves_local_admin_auth,nodes_init=3,services_init=kv:n1ql-kv:index-kv,kv_quota_percent=15,index_quota_percent=15,GROUP=P0
    test_oidc_config_persists_after_restart,nodes_init=3,services_init=kv:n1ql-kv:index-kv,kv_quota_percent=15,index_quota_percent=15,GROUP=P0
    test_oidc_admin_login_with_keycloak_token,nodes_init=3,services_init=kv:n1ql-kv:index-kv,kv_quota_percent=15,index_quota_percent=15,GROUP=P0
    test_oidc_redirect_flow,nodes_init=3,services_init=kv:n1ql-kv:index-kv,kv_quota_percent=15,index_quota_percent=15,GROUP=P0

    test_oidc_external_readonly_user,readonly_username=combined_user@localhost.com,nodes_init=3,services_init=kv:n1ql-kv:index-kv,kv_quota_percent=15,index_quota_percent=15,GROUP=P0
    test_oidc_no_rbac_mapping,jit_provisioning=False,expected_jwt_auth=True,expected_jwt_authz=False,nodes_init=3,services_init=kv:n1ql-kv:index-kv,kv_quota_percent=15,index_quota_percent=15,GROUP=P0

    test_oidc_jit_provisioning_allows_unmapped_user,unmapped_username=unmapped_user@localhost.com,nodes_init=3,services_init=kv:n1ql-kv:index-kv,kv_quota_percent=15,index_quota_percent=15,GROUP=P0
    test_oidc_jit_with_roles_claim,jit_roles_username=admin@localhost.com,jit_roles_expected_role=admin,nodes_init=3,services_init=kv:n1ql-kv:index-kv,kv_quota_percent=15,index_quota_percent=15,GROUP=P0

    test_oidc_get_settings_masked,nodes_init=3,services_init=kv:n1ql-kv:index-kv,kv_quota_percent=15,index_quota_percent=15,GROUP=P0
    test_oidc_invalid_config_rejected,nodes_init=3,services_init=kv:n1ql-kv:index-kv,kv_quota_percent=15,index_quota_percent=15,GROUP=P0

    test_oidc_expired_token_rejected,ttl_realm=cb-shortttl,ttl_client_id=test-client_ttl,ttl_username=adminttl@localhost.com,nodes_init=3,services_init=kv:n1ql-kv:index-kv,kv_quota_percent=15,index_quota_percent=15,GROUP=P0

    test_oidc_jwks_key_rotation,rotation_realm=cb-rotation,rotation_client_id=rotation-client,rotation_username=rotation_user@localhost.com,keycloak_admin_user=admin,nodes_init=3,services_init=kv:n1ql-kv:index-kv,kv_quota_percent=15,index_quota_percent=15,GROUP=P0

    test_oidc_cluster_wide_consistency,nodes_init=3,services_init=kv-kv-kv,default_bucket=True,bucket_size=256,kv_quota_percent=15,index_quota_percent=15,GROUP=P0

    test_oidc_invalid_bearer_tokens_rejected,nodes_init=3,services_init=kv:n1ql-kv:index-kv,kv_quota_percent=15,index_quota_percent=15,GROUP=P0

    test_oidc_jwks_rotation_without_config_reapply,rotation_realm=cb-rotation,rotation_client_id=rotation-client,rotation_username=rotation_user@localhost.com,keycloak_admin_user=admin,nodes_init=3,services_init=kv:n1ql-kv:index-kv,kv_quota_percent=15,index_quota_percent=15,GROUP=P0

    test_oidc_callback_rejects_invalid_state,nodes_init=3,services_init=kv:n1ql-kv:index-kv,kv_quota_percent=15,index_quota_percent=15,GROUP=P0

    test_oidc_query_service_with_bearer_token,unmapped_username=unmapped_user@localhost.com,nodes_init=3,services_init=kv:n1ql-kv:index-kv,kv_quota_percent=15,index_quota_percent=15,GROUP=P0
