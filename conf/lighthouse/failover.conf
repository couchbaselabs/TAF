# ---- Autofailover scenarios (test_autofailover_reflected_on_portal) ----------
# Single-service (kv only) — baseline
lighthouse.failover.lighthouse_failover_tests.LighthouseFailoverTests.test_autofailover_reflected_on_portal,nodes_init=3|2,num_of_clusters=2,ucp_port=8080,failure_method=stop_couchbase
lighthouse.failover.lighthouse_failover_tests.LighthouseFailoverTests.test_autofailover_reflected_on_portal,nodes_init=3|2,num_of_clusters=2,ucp_port=8080,failure_method=stop_couchbase,master_node=true
lighthouse.failover.lighthouse_failover_tests.LighthouseFailoverTests.test_autofailover_reflected_on_portal,nodes_init=3|2,num_of_clusters=2,ucp_port=8080,failure_method=stop_memcached
lighthouse.failover.lighthouse_failover_tests.LighthouseFailoverTests.test_autofailover_reflected_on_portal,nodes_init=3|2,num_of_clusters=2,ucp_port=8080,failure_method=stop_memcached,master_node=true

# Multi-service (kv + n1ql on every primary node) ----------------------------
# services_init=kv:n1ql-kv:n1ql-kv:n1ql|kv-kv
#   primary: all 3 nodes carry both data and query services
#   secondary: 2 nodes with kv only (unchanged baseline)
# stop_couchbase takes down both kv and n1ql, triggering autofailover of the
# whole node.  stop_memcached takes down only kv; the query service stays up
# but autofailover still ejects the node from the cluster.
lighthouse.failover.lighthouse_failover_tests.LighthouseFailoverTests.test_autofailover_reflected_on_portal,nodes_init=3|2,num_of_clusters=2,ucp_port=8080,failure_method=stop_couchbase,services_init=kv:n1ql-kv:n1ql-kv:n1ql|kv-kv
lighthouse.failover.lighthouse_failover_tests.LighthouseFailoverTests.test_autofailover_reflected_on_portal,nodes_init=3|2,num_of_clusters=2,ucp_port=8080,failure_method=stop_couchbase,master_node=true,services_init=kv:n1ql-kv:n1ql-kv:n1ql|kv-kv
