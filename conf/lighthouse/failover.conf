# Lighthouse Failover Tests
# nodes_init=3|2 : 3 nodes in primary cluster (leaves 2 after failing one),
#                  2 nodes in secondary cluster.
# num_of_clusters=2 : primary + one secondary (verifies others unchanged).
# ucp_port=8080   : default portal port.

# ---- No-failover scenarios (trigger_failover=False, default) ----------------
# Node stays in the cluster roster; portal count must remain N throughout.

lighthouse.failover.lighthouse_failover_tests.LighthouseFailoverTests.test_node_failure_reflected_on_portal,nodes_init=3|2,num_of_clusters=2,ucp_port=8080,failure_method=stop_couchbase
lighthouse.failover.lighthouse_failover_tests.LighthouseFailoverTests.test_node_failure_reflected_on_portal,nodes_init=3|2,num_of_clusters=2,ucp_port=8080,failure_method=stop_couchbase,master_node=true
lighthouse.failover.lighthouse_failover_tests.LighthouseFailoverTests.test_node_failure_reflected_on_portal,nodes_init=3|2,num_of_clusters=2,ucp_port=8080,failure_method=stop_memcached
lighthouse.failover.lighthouse_failover_tests.LighthouseFailoverTests.test_node_failure_reflected_on_portal,nodes_init=3|2,num_of_clusters=2,ucp_port=8080,failure_method=stop_memcached,master_node=true
lighthouse.failover.lighthouse_failover_tests.LighthouseFailoverTests.test_node_failure_reflected_on_portal,nodes_init=3|2,num_of_clusters=2,ucp_port=8080,failure_method=restart_couchbase
lighthouse.failover.lighthouse_failover_tests.LighthouseFailoverTests.test_node_failure_reflected_on_portal,nodes_init=3|2,num_of_clusters=2,ucp_port=8080,failure_method=restart_couchbase,master_node=true

# ---- Forceful-failover scenarios (trigger_failover=True, failover_type=forceful) ----
lighthouse.failover.lighthouse_failover_tests.LighthouseFailoverTests.test_node_failure_reflected_on_portal,nodes_init=3|2,num_of_clusters=2,ucp_port=8080,trigger_failover=true,failover_type=forceful
lighthouse.failover.lighthouse_failover_tests.LighthouseFailoverTests.test_node_failure_reflected_on_portal,nodes_init=3|2,num_of_clusters=2,ucp_port=8080,trigger_failover=true,failover_type=forceful,master_node=true

# ---- Graceful-failover scenarios (trigger_failover=True, failover_type=graceful) ----
lighthouse.failover.lighthouse_failover_tests.LighthouseFailoverTests.test_node_failure_reflected_on_portal,nodes_init=3|2,num_of_clusters=2,ucp_port=8080,trigger_failover=true,failover_type=graceful
