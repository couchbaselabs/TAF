# CE Upgrade Tests — CE restriction enforcement and CE→EE upgrade scenarios
upgrade.ce_upgrade.CEUpgradeTests:

    # Rebalance-in of a 6th CE node must be rejected on a 5-node 8.1 CE cluster
    test_ce_node_limit_rebalance_in_blocked,nodes_init=5,services_init=kv-kv-kv-kv-kv,community_upgrade=True,upgrade_version=8.1.0-2333,replicas=0,bucket_size=256,num_items=10,quota_percent=60,bucket_storage=couchstore,GROUP=P0

    # Adding a 6th EE node to a 5-node CE cluster succeeds (mixed-mode entry)
    test_ce_ee_mixed_mode_sixth_node,nodes_init=5,services_init=kv-kv-kv-kv-kv,community_upgrade=True,upgrade_version=8.1.0-2333,replicas=0,bucket_size=256,num_items=10,quota_percent=60,bucket_storage=couchstore,GROUP=P0

    # After full CE→EE upgrade all restrictions are lifted — 6th node can be added
    test_ce_ee_all_restrictions_lifted_post_upgrade,nodes_init=5,services_init=kv-kv-kv-kv-kv,community_upgrade=True,upgrade_version=8.1.0-2333,replicas=0,bucket_size=256,num_items=10,quota_percent=60,bucket_storage=couchstore,GROUP=P0

    # 6-node CE 7.6.x cluster: restriction fires on first CE 8.1 node upgrade,
    # CE→EE swap resolves the stuck cluster. Requires 7 servers in node.ini.
    test_ce_6node_upgrade_restriction_and_ee_resolution,nodes_init=6,services_init=kv-kv-kv-kv-kv-kv,community_upgrade=True,initial_ce_version=7.6.2,upgrade_version=8.1.0-2333,replicas=0,bucket_size=256,num_items=10,quota_percent=60,bucket_storage=couchstore,GROUP=P0
