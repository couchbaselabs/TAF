# CE EE Feature Restriction Tests
# Ported from testrunner community-edition-only-1.conf and community-edition-only-2.conf
#
# Testrunner entries covered (can be disabled after TAF runs green):
# conf-1: test_disabled_zone, check_audit_available, check_ldap_available,
#         test_ldap_groups, test_ldap_cert
# conf-2: check_x509_cert, check_roles_base_access, check_root_certificate,
#         check_settings_audit, test_max_ttl_bucket (REST), test_setting_audit (REST),
#         test_setting_autofailover_enterprise_only x4 (REST),
#         test_set_bucket_compression x3 (REST), test_log_redaction (REST),
#         test_network_encryption, test_n2n_encryption
#
# NOT covered here: check_memory/plasma_storage_mode, check_infer/flex/partitioning/monitoring,
#   XDCR tests, backup tests
# check_set_services* and check_set_services_when_add_node* → see test_ce_service_combinations_*
#   section below.

ns_server.ce_ee_feature_restriction_tests.CeEeFeatureRestrictionTests:
    # --- Server groups ---
    test_disabled_zone,nodes_init=1,services_init=kv,default_bucket=False,use_https=False,GROUP=P0

    # --- Audit ---
    test_audit_not_available,nodes_init=1,services_init=kv,default_bucket=False,use_https=False,GROUP=P0
    test_setting_audit_blocked,nodes_init=1,services_init=kv,default_bucket=False,use_https=False,GROUP=P0

    # --- LDAP ---
    test_ldap_not_available,nodes_init=1,services_init=kv,default_bucket=False,use_https=False,GROUP=P0
    test_ldap_groups_blocked,nodes_init=1,services_init=kv,default_bucket=False,use_https=False,GROUP=P0
    test_ldap_cert_blocked,nodes_init=1,services_init=kv,default_bucket=False,use_https=False,GROUP=P0

    # --- X.509 / Certificates ---
    test_x509_cert_blocked,nodes_init=1,services_init=kv,default_bucket=False,use_https=False,GROUP=P0
    test_root_certificate_blocked,nodes_init=1,services_init=kv,default_bucket=False,use_https=False,GROUP=P0

    # --- RBAC ---
    test_rbac_admin_user_blocked,nodes_init=1,services_init=kv,default_bucket=False,use_https=False,user_add=test22,user_role=admin,GROUP=P0

    # --- Bucket EE features ---
    test_max_ttl_bucket_blocked,nodes_init=1,services_init=kv,default_bucket=False,use_https=False,GROUP=P0
    # off/passive/active iterated internally
    test_bucket_compression_blocked,nodes_init=1,services_init=kv,default_bucket=False,use_https=False,GROUP=P0

    # --- Log redaction ---
    test_log_redaction_blocked,nodes_init=1,services_init=kv,default_bucket=False,use_https=False,GROUP=P0

    # --- Network encryption ---
    test_network_encryption_blocked,nodes_init=1,services_init=kv,default_bucket=False,use_https=False,GROUP=P0
    test_n2n_encryption_blocked,nodes_init=1,services_init=kv,default_bucket=False,use_https=False,GROUP=P0

    # --- Auto-failover EE settings ---
    test_autofailover_disk_failover_blocked,nodes_init=1,services_init=kv,default_bucket=False,use_https=False,GROUP=P0
    test_autofailover_server_group_failover_blocked,nodes_init=1,services_init=kv,default_bucket=False,use_https=False,GROUP=P0

