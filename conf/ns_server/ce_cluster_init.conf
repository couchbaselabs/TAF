# CE Cluster Init REST API Enforcement Tests (CBQE-8972)
# Jenkins install param: edition=community
#
# test_ce_send_stats_cannot_disable_post_init:
#   - Requires only 1 CE node. Tests /settings/stats POST rejection.
#
# test_ce_send_stats_enforced_at_cluster_init:
#   - Requires 1 CE cluster node + 1 spare node in node.ini.
#   - Spare is hard-reset to simulate a fresh install.
#   - Skips gracefully if no spare node is available.
ns_server.ce_cluster_init_tests.CeClusterInitRestTests:
    test_ce_send_stats_enforced_at_cluster_init,nodes_init=1,services_init=kv,default_bucket=False,use_https=False,GROUP=P1
    test_ce_send_stats_cannot_disable_post_init,nodes_init=1,services_init=kv,default_bucket=False,use_https=False,GROUP=P0
