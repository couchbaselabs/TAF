# Credential Store Test Suite — CB 8.1+ Enterprise
#
# Prerequisites:
#   - Enterprise Edition 8.1+ cluster
#   - Config encryption ON (default in 8.1)
#   - n2n encryption OR override (setUp runs before EVERY test and re-applies
#     n2nEncryptionOverride=true, so test order does not matter)


ns_server.credential_store_test.CredentialStoreTest:

    #Admin CRUD, secret redaction, and input validation
    test_admin_crud_and_secret_redaction,nodes_init=1,services_init=kv,GROUP=P0

    # Pattern A end-user consume path (RBAC: alice allowed, bob denied)
    # n1ql required: @cbq-engine must be running to call /_cbauth/getCredential
    test_pattern_a_end_user_consumption,nodes_init=1,services_init=kv:n1ql,GROUP=P0

    # Guardrail allow and deny branches (allowedServices enforcement)
    test_guardrails_enforcement_pattern_a,nodes_init=1,services_init=kv:n1ql,GROUP=P0

    # Pattern B service-identity path + service role RBAC enforcement
    test_pattern_b_service_identity,nodes_init=1,services_init=kv:n1ql,GROUP=P0

    # Prerequisites (n2n override), store settings, warnings, expiresAt validation
    test_prerequisites_override_and_expiry,nodes_init=1,services_init=kv,test_expiry_wait=False,GROUP=P0

    test_cross_node_credential_consume,nodes_init=2,services_init=kv:n1ql,GROUP=P1

    # S6.2: Node failure resilience — credential survives Node A going offline
    test_node_failure_resilience,nodes_init=2,services_init=kv,GROUP=P1

    # T08: Credential type smoke — POST→GET→redaction for all 8 types (kv only)
    test_credential_type_smoke,nodes_init=1,services_init=kv,GROUP=P1

    # T11: Consume auth matrix (12 rows, Pattern A + B, all error codes)
    test_consume_auth_matrix,nodes_init=1,services_init=kv:n1ql,test_expiry_wait=False,GROUP=P1
    # test_consume_auth_matrix,nodes_init=1,services_init=kv:n1ql,test_expiry_wait=True,GROUP=P1

    # T12: RBAC grant matrix — who can grant credential_consumer to users vs services
    # G6/G7 (@cbq-engine rows) are skipped automatically if cbq_engine_password is unavailable
    test_rbac_grant_matrix,nodes_init=1,services_init=kv:n1ql,GROUP=P1

    # T13: Wildcard role boundaries — db/* slash boundary + *prod/key rejection (400) + * master key
    test_wildcard_role_boundaries,nodes_init=1,services_init=kv:n1ql,GROUP=P1

    # T14: Credential ID validation — max length (128/129), character whitelist, duplicate collision
    test_id_validation_matrix,nodes_init=1,services_init=kv,GROUP=P1
