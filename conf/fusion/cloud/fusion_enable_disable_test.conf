# Fusion Enable / Disable / Stop / Override — Cloud (Capella) Tests
#
# Tests the full lifecycle of enabling, stopping, disabling, and overriding
# Express Scaling (Fusion) on Capella dedicated clusters.
#
# Required runtime parameters (pass via -p):
#   aws_access_key=<key>
#   aws_secret_key=<secret>
#
# Data volume guide:
#   Below fusion threshold (→ DCP rebalance):  num_items=500000   (~500 MB at 1 KB/doc)
#   Above fusion threshold (→ fusion rebalance): num_items=15000000 (~15 GB at 1 KB/doc)
#   Default threshold: fusion_threshold_gib=10
#
# Execution:
#   python testrunner.py -i node.ini \
#       -c conf/fusion/cloud/fusion_enable_disable_test.conf \
#       -p aws_access_key=$AWS_ACCESS_KEY_ID,aws_secret_key=$AWS_SECRET_ACCESS_KEY


aGoodDoctor.fusion.fusion_enable_disable_test.FusionEnableDisableTests:

    # Enable fusion on an existing cluster; verify S3 bucket creation and idempotency
    test_enable_fusion_on_existing_cluster,num_items=15000000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600

    # Cancel (stop) a fusion enable mid-flight; S3 bucket should be empty
    ## test_enable_fusion_cancel_leaves_empty_s3_bucket,num_items=15000000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600

    # Stop via internal API while enable is in progress
    ## test_stop_fusion_during_enable,num_items=15000000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600

    # Kill memcached during enable; CP must retry and reach enabled
    test_kill_memcached_during_enable_cp_retries,num_items=15000000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600

    # Re-enable from stopped state; S3 objects must be preserved across cycle
    test_enable_fusion_from_stopped_state,num_items=15000000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600

    # Restart ns_server on one node while enable is in progress; CP must recover
    test_ns_server_restart_during_enable,num_items=15000000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600

    # Data below threshold → DCP rebalance (no accelerators)
    test_rebalance_below_threshold_uses_dcp,num_items=500000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600,fusion_threshold_gib=10

    # Data above threshold → fusion rebalance (accelerator instances created)
    test_rebalance_above_threshold_uses_fusion,kv_nodes=3,num_items=15000000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600,fusion_threshold_gib=10

    # fusion-rebalances flag disabled → DCP even when fusion is enabled
    test_enable_fusion_no_rebalance_use,num_items=15000000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600

    # New bucket created while fusion is enabled must inherit isFusionBucket=true
    test_new_bucket_inherits_fusion_when_enabled,ramQuota=5000,num_items=100000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600

    # Validate GET /fusion/status response structure (fields, pending bytes)
    test_fusion_status_api_fields,num_items=15000000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600

    # Stop when already disabled → no-op (200/409/422), state unchanged
    test_stop_fusion_when_already_disabled,num_items=15000000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600

    # Stop while fusion rebalance is active → resources cleaned up, S3 preserved
    test_stop_fusion_during_active_rebalance,num_items=15000000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600,fusion_threshold_gib=10

    # Stop vs Disable: stop preserves S3 objects; disable deletes them
    test_stop_vs_disable_s3_retention_difference,num_items=15000000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600

    # After stop, next rebalance falls back to DCP (no accelerators)
    test_stop_fusion_on_synced_data_falls_back_to_dcp_rebalance,num_items=15000000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600

    # Stop → re-enable resumes uploads from checkpoint (not from zero)
    test_stop_then_reenable_resumes_uploads_from_checkpoint,num_items=15000000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600

    # Disable after full sync → S3 objects deleted, bucket removed
    test_disable_fusion_when_synced_deletes_s3_objects,num_items=15000000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600

    # Disable with no rebalance → uploads stop, S3 bucket deleted
    test_disable_fusion_no_rebalance_stops_uploads,num_items=15000000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600

    # Disable while fusion rebalance is running → waits for rebalance, then cleans up
    test_disable_fusion_during_rebalance_waits_for_operations,num_items=15000000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600,fusion_threshold_gib=10

    # Disable after a successful fusion rebalance while hydration is still active; guest volumes must not be prematurely cleaned up
    test_disable_fusion_after_rebalance_during_hydration,num_items=15000000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600,fusion_threshold_gib=10

    # Disable while log files are leased (post-prepareRebalance)
    test_disable_fusion_during_prepare_rebalance_with_leased_logs,num_items=15000000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600,fusion_threshold_gib=10

    # Re-enable after disable reuses the same S3 bucket (emptied, not deleted)
    test_reenable_fusion_reuses_s3_bucket,num_items=15000000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600

    # Disable from stopped state must delete S3 objects (not just halt sync)
    test_disable_fusion_from_stopped_state,num_items=15000000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600

    # Disable during enabling state → S3 objects cleaned up
    test_disable_fusion_during_enabling_state,num_items=15000000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600

    # override=True forces DCP rebalance while fusion is enabled
    test_override_rebalances_skips_fusion_while_enabled,num_items=15000000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600,fusion_threshold_gib=10

    # override=False restores fusion-accelerated rebalances
    test_override_rebalances_false_restores_fusion_rebalance,num_items=15000000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600,fusion_threshold_gib=10

    # override=True on a disabled cluster is a no-op
    test_override_has_no_effect_when_fusion_disabled,num_items=15000000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600

    # All rejected transitions per design doc permission table return 4xx
    test_invalid_state_transitions,num_items=15000000,doc_size=1024,replicas=1,num_buckets=1,region=us-east-1,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=600
