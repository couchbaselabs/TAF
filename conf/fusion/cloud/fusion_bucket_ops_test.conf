# Fusion Bucket Operations — Cloud (Capella) Tests
#
# Validates that bucket-level operations with fusion enabled do not corrupt or
# inadvertently delete the fusion S3 log-store
# (§5 of the E2E Capella Integration Test Plan).
#
# Required runtime parameters (pass via -p):
#   aws_access_key=<key>
#   aws_secret_key=<secret>
#
# Data volume:
#   create_end=100000000 → 100M docs × 1 KB = ~100 GB
#
# Execution:
#   python testrunner.py -i node.ini \
#       -c conf/fusion/cloud/fusion_bucket_ops_test.conf \
#       -p aws_access_key=$AWS_ACCESS_KEY_ID,aws_secret_key=$AWS_SECRET_ACCESS_KEY


aGoodDoctor.fusion.fusion_bucket_ops_test.FusionBucketOpsTest:

    # Test 9: Flush must clean up the S3 log-store to < 1 GB
    # sync_wait_timeout=3600 — 100M docs × 1 KB = ~100 GB; CP needs time to delete all log-store objects
    test_bucket_flush_cleans_s3_objects,create_end=100000000,doc_size=1024,replicas=1,num_buckets=1,kv_nodes=3,region=us-west-2,compute=c7g.4xlarge,disk=200,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=3600,fusion_threshold_gib=10

    # Test 10: Delete all buckets after rebalance — EBS guest volumes cleaned within 5 minutes
    test_bucket_delete_after_rebalance_cleans_guest_volumes,create_end=100000000,doc_size=1024,replicas=1,num_buckets=1,kv_nodes=3,region=us-west-2,compute=c7g.4xlarge,disk=200,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=1200,fusion_threshold_gib=10

    # Test 11: Flush all buckets after rebalance — no orphaned EBS guest volumes within 5 minutes
    test_bucket_flush_after_rebalance_no_guest_volumes,create_end=100000000,doc_size=1024,replicas=1,num_buckets=1,kv_nodes=3,region=us-west-2,compute=c7g.4xlarge,disk=200,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=1200,fusion_threshold_gib=10
