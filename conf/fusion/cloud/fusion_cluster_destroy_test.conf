# Fusion Cluster Destroy — Cloud (Capella) Tests
#
# Validates that destroying a Capella cluster during an active fusion rebalance
# correctly cleans up all AWS resources created by the CP for the fusion path:
# EBS guest volumes, accelerator instances, ASGs, cluster nodes, S3 bucket,
# and IAM instance profiles
# (§11 of the E2E Capella Integration Test Plan).
#
# IMPORTANT: Each test in this file deploys its own dedicated cluster.
# There is NO shared cluster between tests — every test incurs a full
# cluster create + destroy cycle. Do not pass clusters= when running this conf.
#
# Required runtime parameters (pass via -p):
#   aws_access_key=<key>
#   aws_secret_key=<secret>
#
# Data volume:
#   create_end=200000000 → 200M docs × 1 KB = ~200 GB
#   Larger dataset ensures accelerators are active long enough for each test
#   to reliably land its destroy call in the intended rebalance phase.
#
# Execution:
#   python testrunner.py -i node.ini \
#       -c conf/fusion/cloud/fusion_cluster_destroy_test.conf \
#       -p aws_access_key=$AWS_ACCESS_KEY_ID,aws_secret_key=$AWS_SECRET_ACCESS_KEY


aGoodDoctor.fusion.fusion_cluster_destroy_test.FusionClusterDestroyTest:

    # Test 1: Destroy immediately after rebalance starts, before accelerators appear (phases 2-3)
    test_destroy_after_prepare_rebalance,create_end=200000000,doc_size=1024,replicas=1,num_buckets=1,kv_nodes=3,region=us-west-2,compute=c7g.4xlarge,disk=200,sdk_timeout=60,index_timeout=7200,sync_wait_timeout=1200,fusion_threshold_gib=10

    # Test 2: Destroy during S3→EBS hydration (phase 5, EBS volumes are present)
    test_destroy_during_s3_download,create_end=200000000,doc_size=1024,replicas=1,num_buckets=1,kv_nodes=3,region=us-west-2,compute=c7g.4xlarge,disk=200,sdk_timeout=60,index_timeout=7200,sync_wait_timeout=1200,fusion_threshold_gib=10

    # Test 3: Destroy when EBS volumes are attached to KV nodes (phase 6, file extent migration)
    test_destroy_during_file_extent_migration,create_end=200000000,doc_size=1024,replicas=1,num_buckets=1,kv_nodes=3,region=us-west-2,compute=c7g.4xlarge,disk=200,sdk_timeout=60,index_timeout=7200,sync_wait_timeout=1200,fusion_threshold_gib=10

    # Test 4: Delete S3 bucket during phase 5 to force scaleFailed, then destroy
    test_destroy_in_scale_failed_state,create_end=200000000,doc_size=1024,replicas=1,num_buckets=1,kv_nodes=3,region=us-west-2,compute=c7g.4xlarge,disk=200,sdk_timeout=60,index_timeout=7200,sync_wait_timeout=1200,fusion_threshold_gib=10
