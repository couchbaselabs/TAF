# Fusion Miscellaneous Tests — Cloud (Capella)
#
# Regression and functional tests that deploy their own isolated cluster per
# test (not shared).  See FusionMiscTest docstring for lifecycle details.
#
# Required runtime parameters (pass via -p):
#   aws_access_key=<key>
#   aws_secret_key=<secret>
#
# Execution:
#   python testrunner.py -i node.ini \
#       -c conf/fusion/cloud/fusion_misc_test.conf \
#       -p aws_access_key=$AWS_ACCESS_KEY_ID,aws_secret_key=$AWS_SECRET_ACCESS_KEY


aGoodDoctor.fusion.fusion_misc_test.FusionMiscTest:

    # Test 1 (AV-134300): concurrent node scale-down + disk scale-up with fusion enabled
    test_concurrent_node_scale_down_and_disk_scale_up,initial_kv_nodes=11,target_kv_nodes=3,initial_disk_gb=1024,target_disk_gb=2048,kv_nodes=3,region=us-west-2,compute=c7g.4xlarge,disk=50,sdk_timeout=60,rebalance_timeout=7200

    # Test 2: concurrent node scale-up + disk scale-up with fusion enabled
    test_concurrent_node_and_disk_scale_up,initial_kv_nodes=3,target_kv_nodes=6,initial_disk_gb=200,target_disk_gb=400,kv_nodes=3,region=us-west-2,compute=c7g.4xlarge,disk=50,sdk_timeout=60,rebalance_timeout=7200
