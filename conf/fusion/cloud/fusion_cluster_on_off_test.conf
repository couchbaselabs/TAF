# Fusion Cluster On/Off — Cloud (Capella) Tests
#
# Validates cluster turn-off / turn-on operations with fusion enabled, covering
# scenarios from idle upload through active rebalance with live EBS guest volumes
# (§6 of the E2E Capella Integration Test Plan).
#
# Required runtime parameters (pass via -p):
#   aws_access_key=<key>
#   aws_secret_key=<secret>
#
# Data volume:
#   create_end=100000000 → 100M docs × 1 KB = ~100 GB (above fusion threshold)
#   fusion_threshold_gib=10 ensures fusion path is taken for rebalances in tests 11 and 12
#
# Timing notes:
#   turn_off_timeout=600   — cluster turn-off SLA (10 min)
#   turn_on_timeout=1200   — cluster turn-on SLA (20 min)
#   sync_wait_timeout=7200 — allow up to 2 h for 100M docs to fully sync to S3 (test 10)
#   volume_wait_timeout=1800 — poll window to catch live guest volumes during rebalance (test 11)
#   detach_wait_timeout=1800 — window to catch post-CBS-rebalance 'available' volumes (test 12)
#   orphan_cleanup_timeout=1200 — time for CP to delete orphaned volumes while cluster is off (test 12)
#
# Execution:
#   python testrunner.py -i node.ini \
#       -c conf/fusion/cloud/fusion_cluster_on_off_test.conf \
#       -p aws_access_key=$AWS_ACCESS_KEY_ID,aws_secret_key=$AWS_SECRET_ACCESS_KEY


aGoodDoctor.fusion.fusion_cluster_on_off_test.FusionClusterOnOffTest:

    # Test 10: Turn off while S3 upload is in-flight; verify upload resumes after turn-on
    test_cluster_off_on_with_pending_sync_resumes_upload,create_end=100000000,doc_size=1024,replicas=1,num_buckets=1,kv_nodes=3,region=us-west-2,compute=c7g.4xlarge,disk=200,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=7200,fusion_threshold_gib=10,turn_off_timeout=600,turn_on_timeout=1200

    # Test 11: Turn off while a fusion rebalance has live guest volumes; verify full cleanup after turn-on
    test_cluster_off_on_while_guest_volumes_present,create_end=100000000,doc_size=1024,replicas=1,num_buckets=1,kv_nodes=3,region=us-west-2,compute=c7g.4xlarge,disk=200,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=1200,fusion_threshold_gib=10,turn_off_timeout=600,turn_on_timeout=1200,volume_wait_timeout=1800

    # Test 12: Turn off after volumes detached from CBS/KV nodes (phase 8 window, before CP deletes)
    test_cluster_off_on_after_guest_volume_detach,create_end=100000000,doc_size=1024,replicas=1,num_buckets=1,kv_nodes=3,region=us-west-2,compute=c7g.4xlarge,disk=200,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=1200,fusion_threshold_gib=10,turn_off_timeout=600,turn_on_timeout=1200,detach_wait_timeout=1800,orphan_cleanup_timeout=1200
