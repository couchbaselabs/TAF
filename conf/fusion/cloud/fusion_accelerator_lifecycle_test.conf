# Fusion Accelerator Lifecycle — Cloud (Capella) Tests
#
# Validates the full lifecycle of fusion accelerator EC2 instances and EBS
# guest volumes during Couchbase rebalances on AWS-backed Capella clusters
# (§2 and §7 of the E2E Capella Integration Test Plan).
#
# Required runtime parameters (pass via -p):
#   aws_access_key=<key>
#   aws_secret_key=<secret>
#
# Data volume:
#   create_end=100000000 → 100M docs × 1 KB = ~100 GB (above fusion threshold)
#   fusion_threshold_gib=10 ensures fusion path is taken for all rebalances
#
# Execution:
#   python testrunner.py -i node.ini \
#       -c conf/fusion/cloud/fusion_accelerator_lifecycle_test.conf \
#       -p aws_access_key=$AWS_ACCESS_KEY_ID,aws_secret_key=$AWS_SECRET_ACCESS_KEY


aGoodDoctor.fusion.fusion_accelerator_lifecycle_test.FusionAcceleratorLifecycleTest:

    # Test 1: Accelerator EC2 instances are launched during rebalance (phase 4)
    test_accelerator_creation_during_rebalance,create_end=100000000,doc_size=1024,replicas=1,num_buckets=1,kv_nodes=3,region=us-west-2,compute=c7g.4xlarge,disk=200,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=1200,fusion_threshold_gib=10

    # Test 2: Accelerators and ASGs are torn down after rebalance (phase 8)
    test_accelerator_termination_after_rebalance,create_end=100000000,doc_size=1024,replicas=1,num_buckets=1,kv_nodes=3,region=us-west-2,compute=c7g.4xlarge,disk=200,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=1200,fusion_threshold_gib=10

    # Test 3: Full EBS guest volume lifecycle — created, hydrated, then count=0
    test_ebs_guest_volume_full_lifecycle,create_end=100000000,doc_size=1024,replicas=1,num_buckets=1,kv_nodes=3,region=us-west-2,compute=c7g.4xlarge,disk=200,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=1200,fusion_threshold_gib=10

    # Test 4: Back-to-back rebalances leave no orphaned EBS guest volumes
    test_back_to_back_rebalances_no_orphaned_volumes,create_end=100000000,doc_size=1024,replicas=1,num_buckets=1,kv_nodes=3,region=us-west-2,compute=c7g.4xlarge,disk=200,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=1200,fusion_threshold_gib=10

    # Test 5: Fusion state stays 'enabled' throughout the rebalance
    test_fusion_state_stays_enabled_through_rebalance,create_end=100000000,doc_size=1024,replicas=1,num_buckets=1,kv_nodes=3,region=us-west-2,compute=c7g.4xlarge,disk=200,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=1200,fusion_threshold_gib=10

    # Test 6: Accelerator instance count scales with data size (0 below threshold, ≥1 above)
    test_accelerator_instance_count_matches_data_size,create_end=100000000,doc_size=1024,replicas=1,num_buckets=1,kv_nodes=3,region=us-west-2,compute=c7g.4xlarge,disk=200,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=1200,fusion_threshold_gib=10,small_create_end=100,expected_accelerator_count=1

    # Test 7: Accelerator EC2 nodes must have no public IP address
    test_no_public_ip_on_accelerator_nodes,create_end=100000000,doc_size=1024,replicas=1,num_buckets=1,kv_nodes=3,region=us-west-2,compute=c7g.4xlarge,disk=200,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=1200,fusion_threshold_gib=10

    # Test 8: Guest volume storage class, IOPS, throughput, encryption, tags, and AZ colocation
    test_guest_volume_properties,create_end=100000000,doc_size=1024,replicas=1,num_buckets=1,kv_nodes=3,region=us-west-2,compute=c7g.4xlarge,disk=200,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=1200,fusion_threshold_gib=10,expected_iops=16000,expected_throughput=2000

    # Test 9: Guest volume size scales with data size [stub — skipped at runtime]
    ## test_guest_volume_size_scales_with_data,create_end=100000000,doc_size=1024,replicas=1,num_buckets=1,kv_nodes=3,region=us-west-2,compute=c7g.4xlarge,disk=200,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=1200,fusion_threshold_gib=10,small_create_end=1000000

    # Test 10: All accelerator ASGs are deleted within 5 minutes of rebalance completion
    test_asg_deleted_after_rebalance_within_5_mins,create_end=100000000,doc_size=1024,replicas=1,num_buckets=1,kv_nodes=3,region=us-west-2,compute=c7g.4xlarge,disk=200,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=1200,fusion_threshold_gib=10

    # Test 11: Terminate one accelerator mid-rebalance; verify relaunch and completion
    # 200M items keeps accelerators active long enough for termination to land during phase 5
    test_accelerator_node_termination_resilience,create_end=200000000,doc_size=1024,replicas=1,num_buckets=1,kv_nodes=3,region=us-west-2,compute=c7g.4xlarge,disk=200,sdk_timeout=60,index_timeout=7200,sync_wait_timeout=1200,fusion_threshold_gib=10,relaunch_timeout=600
