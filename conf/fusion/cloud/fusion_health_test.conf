# Fusion Health — Cloud (Capella) Tests
#
# Validates fusion steady-state health properties: upload continuity across
# stop/start cycles, pending sync bounds, and log-file growth rates
# (§3 of the E2E Capella Integration Test Plan).
#
# Required runtime parameters (pass via -p):
#   aws_access_key=<key>
#   aws_secret_key=<secret>
#
# Data volume:
#   create_end=100000000 → 100M docs × 1 KB = ~100 GB
#
# Execution:
#   python testrunner.py -i node.ini \
#       -c conf/fusion/cloud/fusion_health_test.conf \
#       -p aws_access_key=$AWS_ACCESS_KEY_ID,aws_secret_key=$AWS_SECRET_ACCESS_KEY


aGoodDoctor.fusion.fusion_health_test.FusionHealthTest:

    # Test 8: Stop fusion and re-enable it; verify S3 uploads resume from checkpoint
    test_stop_start_fusion_resumes_s3_upload,create_end=100000000,doc_size=1024,replicas=1,num_buckets=1,kv_nodes=3,region=us-west-2,compute=c7g.4xlarge,disk=200,sdk_timeout=60,index_timeout=3600,sync_wait_timeout=1200,fusion_threshold_gib=10
