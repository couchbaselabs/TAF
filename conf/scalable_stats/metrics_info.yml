      fail_on_unknown_prefix: false
      skip_prefix_validation: true
    get_all_metrics:
      fail_on_unknown_prefix: false
      skip_prefix_validation: false
    stats_1000_collections:
      fail_on_unknown_prefix: false
      skip_prefix_validation: true
