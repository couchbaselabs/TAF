storage.magma.magma_comparator_test.MagmaUnsafeWindow:

    # Test: Magma integer-overflow vulnerability window
    #
    # 3 collections (cold / hot / warm) each loaded with 100M docs targeting
    # a single vBucket.  The hot collection is updated continuously until the
    # keyIndex maxSn crosses INT32_MAX (2147483647), confirming the bug on the
    # installed build.  After hitting the window the diagnostic scripts run,
    # an offline upgrade is applied node-by-node, and post-upgrade observations
    # are printed.
    #
    # Parameters:
    #   nodes_init          - number of KV nodes in the cluster
    #   num_collections     - must be >= 4  (1 default + cold + hot + warm)
    #   docs_to_load        - docs per collection targeting the target vBucket
    #   doc_size            - document size in bytes
    #   idx_to_monitor      - colon-separated Magma indexes to watch for overflow
    #                         choices: keyIndex, seqIndex, localIndex
    #   check_interval      - seconds between each maxSn poll (default 600 = 10 min)
    #   vul_threshold       - maxSn threshold to consider vulnerability hit (default INT32_MAX)
    #   assert_vulnerable   - assert diagnostic scripts report VULNERABLE pre-upgrade (default True)
    #   version_to_upgrade  - target build for the offline upgrade  e.g. 7.6.7-6700
    #   sdk_timeout         - SDK operation timeout in seconds

    # init_loading=False  — skips the base-class setUp load; this test does its own targeted load
    # num_items is unused when init_loading=False but kept small to avoid accidental load if flag is missed
    test_magma_unsafe_window,nodes_init=2,num_collections=4,init_loading=False,num_items=20000,docs_to_load=20000,doc_size=1024,idx_to_monitor=seqIndex,check_interval=600,version_to_upgrade=7.6.11-8486,sdk_timeout=60,replicas=0,GROUP=P0;unsafe_window

    # Test: Continuous load + check — load 50K docs, then 2000 update iterations
    # in one thread while periodically running check_vulnerable_vbuckets.sh in another.
    # Parameters: docs_to_load=50K, num_update_iterations=2000, check_interval=120s (2 min)
    test_magma_continuous_load_and_check,nodes_init=1,num_collections=2,init_loading=False,num_items=20000,docs_to_load=50000,doc_size=1024,num_update_iterations=2000,check_interval=120,sdk_timeout=60,replicas=0,GROUP=P1;continuous_load_check
