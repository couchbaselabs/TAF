# Continuous Backup Cluster Operations Test Configuration
#
# IMPORTANT: PITR (Point-in-Time Recovery) is only supported on Magma buckets.
#            All entries below use bucket_spec=single_bucket.continuous_backup_tests
#            which enforces Bucket.StorageBackend.magma.  Never run PITR tests
#            against a Couchbase (couchstore) bucket.
#
# GAP ADDRESSED: The existing collections_rebalance.conf / collections_quorum_loss.conf
# entries (under conf/backup_restore/) only confirm that cbbackupmgr backup *runs*
# alongside cluster operations.  They do NOT verify that a PITR timestamp captured
# BEFORE the operation restores correctly to the pre-operation data state.
#
# These tests close that gap:
#   1. Capture timestamp T1 + count C1 BEFORE the cluster operation.
#   2. Perform the cluster operation (rebalance / failover / quorum loss / KV restart).
#   3. Capture timestamp T2 + count C2 AFTER the operation.
#   4. PITR restore to T1  ->  assert count == C1.
#   5. PITR restore to T2  ->  assert count == C2.
#
# Infrastructure requirements:
#   nodes_init=4        — 4 nodes already in the cluster.
#   Server pool size    — must have at least 5 servers available so the rebalance-in
#                         test can pick up a spare node.  The extra node is not part
#                         of the initial cluster; it is selected from self.cluster.servers.
#   cont_bkp_test=NFS   — activates NFS mount + cbbackupmgr repo creation in setUp.
#   NFS server          — /data exported; client mounts at /mnt/nfs_data.
#                         See: github.com/couchbaselabs/test_infra_runner/tree/master/
#                              scripts/pitr_scripts
#
# Common parameters applied to all entries:
#   cont_bkp_test=NFS
#   nodes_init=4
#   bucket_spec=single_bucket.continuous_backup_tests  (Magma, 10x10x1000 items)
#   data_spec_name=initial_load
#   continuous_backup_enabled=True
#   continuous_backup_interval=2                       (2-minute cycle)
#
# Optional NFS override parameters (defaults come from lib/testconstants.py):
#   pitr_nfs_server=<ip>       — NFS server IP (default: PITR_NFS_SERVER constant)
#   pitr_nfs_username=<user>   — NFS server SSH username (default: root)
#   pitr_nfs_password=<pass>   — NFS server SSH password (default: couchbase)

backup_restore.continuous_backup.continuous_backup_cluster_ops_test.ContinuousBackupClusterOpsTest:

    # -----------------------------------------------------------------------
    # P0 — PITR timestamp integrity across rebalance operations
    #
    # Each test captures T1 before the rebalance, runs the rebalance, captures
    # T2 after, then verifies independent PITR restores at both timestamps.
    # The continuous backup DCP stream must survive vbucket migration without
    # any sequence-number gaps.
    # -----------------------------------------------------------------------

    # Rebalance a new KV node in.  Requires a spare server in the pool (>= 5 servers total).
    test_pitr_timestamps_across_rebalance_in,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P0

    # Rebalance a non-master KV node out (stays at 3 nodes post-rebalance).
    test_pitr_timestamps_across_rebalance_out,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P0

    # Simultaneous add + remove (swap rebalance).  Requires >= 5 servers in pool.
    test_pitr_timestamps_across_swap_rebalance,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P0

    # -----------------------------------------------------------------------
    # P0 — PITR timestamp integrity across failover operations
    #
    # Graceful failover migrates active vbuckets before taking the node offline.
    # Hard failover immediately promotes replicas.  Both must leave the
    # continuous backup DCP stream intact for pre-failover PITR timestamps.
    # -----------------------------------------------------------------------

    # Graceful failover of one non-master KV node, then rebalance-out.
    test_pitr_timestamps_across_graceful_failover,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P0

    # Hard (non-graceful) failover of one non-master KV node, then rebalance-out.
    test_pitr_timestamps_across_hard_failover,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P0

    # -----------------------------------------------------------------------
    # P0 — PITR timestamp integrity across quorum loss + unsafe failover
    #
    # Simulates losing a majority of KV nodes (2 out of 4) and performing an
    # unsafe failover to recover.  Requires nodes_init=4 (the test self-skips
    # if fewer than 4 KV nodes are available).
    # -----------------------------------------------------------------------
    test_pitr_timestamps_across_quorum_loss,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P0

    # -----------------------------------------------------------------------
    # P1 — PITR correctness after KV process (memcached) restart
    #
    # Kills memcached on one non-master KV node during continuous backup and
    # verifies that the DCP stream reconnects without leaving a gap in the
    # PITR log.  A gap would cause the post-restart PITR restore to fail or
    # return a stale document count.
    # -----------------------------------------------------------------------
    test_pitr_after_kv_process_restart,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P1
