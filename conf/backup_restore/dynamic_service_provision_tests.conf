# Dynamic service provision with continuous backup verification
# Enables continuous backup and verifies traditional backup + PITR restore after service provisioning
#
# Parameters:
#   continuous_backup_enabled: Enable/disable continuous backup (default: true)
#   continuous_backup_interval: Backup interval in minutes (default: 5)
bucket_collections.dynamic_service_provision_tests.DynamicServiceProvisionTests:
    test_topology_keys,nodes_init=4,continuous_backup_enabled=True,continuous_backup_interval=5,cont_bkp_test=NFS,GROUP=P0
    test_topology_otp_node_value,nodes_init=4,continuous_backup_enabled=True,continuous_backup_interval=5,cont_bkp_test=NFS,GROUP=P0
