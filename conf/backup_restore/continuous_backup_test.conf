# Continuous backup test configuration
# This test generates documents using cbbackupmgr, enables continuous backup,
# and verifies continuous backup params are set correctly.
#
# Parameters:
#   bucket_name: Name of the bucket for continuous backup (default: cb_cont_bkp_bucket)
#   continuous_backup_location: Location for continuous backup files (default: /tmp/cont_bkp)
#   continuous_backup_interval: Backup interval in minutes (default: 5)
#   continuous_backup_enabled: Enable/disable continuous backup (default: true)
#   num_docs: Number of documents to generate (default: 100000)
backup_restore.continuous_backup.continuous_backup_test.ContinuousBackupTest:
    test_continuous_backup_params,nfs_test=True,nodes_init=4,bucket_name=cb_cont_bkp_bucket,continuous_backup_interval=5,continuous_backup_enabled=true,num_docs=100000,GROUP=P0
