# Continuous backup / PITR test configuration
#
# IMPORTANT: PITR (Point-in-Time Recovery) is only supported on Magma buckets.
#            All entries below use bucket_spec=single_bucket.continuous_backup_tests
#            or bucket_spec=multi_bucket.continuous_backup_tests, both of which
#            enforce Bucket.StorageBackend.magma.  Never run PITR tests against
#            a Couchbase (couchstore) bucket.
#
# Common parameters:
#   cont_bkp_test=NFS          — activates NFS-based continuous backup setup in
#                                 CollectionBase.setUp (mounts NFS, creates unique
#                                 backup subdirectory, initialises cbbackupmgr repo)
#   nodes_init=4               — 4-node cluster; MAJORITY durability tests need >= 3 KV nodes
#   continuous_backup_interval=2 — 2-minute backup cycle (keeps test wall-clock time low)
#   data_spec_name=initial_load  — CRUD spec used by load_data_from_spec_file()
#   GROUP=P0/P1/P2             — priority tier for CI pipeline selection
#
# Optional NFS override parameters (defaults come from lib/testconstants.py):
#   pitr_nfs_server=<ip>       — NFS server IP (default: PITR_NFS_SERVER constant)
#   pitr_nfs_username=<user>   — NFS server SSH username (default: root)
#   pitr_nfs_password=<pass>   — NFS server SSH password (default: couchbase)

backup_restore.continuous_backup.continuous_backup_test.ContinuousBackupTest:

    # -----------------------------------------------------------------------
    # P0 — Core PITR happy-path, restore, and critical scenario tests
    # (single Magma bucket, single_bucket.continuous_backup_tests spec)
    # 15 tests — sized to complete within CI job time limit
    # -----------------------------------------------------------------------
    test_pitr_happy_path,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,GROUP=P0
    test_pitr_timestamp_after_first_cont_backup,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P0
    test_pitr_timestamp_after_second_cont_backup,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P0
    test_pitr_five_sequential_restores,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P0
    test_pitr_five_haphazard_restores,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P0
    test_pitr_restore_before_mutation,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,initial_load=False,GROUP=P0
    test_pitr_restore_after_mutation,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,initial_load=False,GROUP=P0
    test_pitr_restore_to_new_bucket_with_multiple_timestamps_1,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P0
    test_pitr_restore_to_new_bucket_with_multiple_timestamps_2,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P0
    test_pitr_with_incremental_merge_with_numbers,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P0
    test_pitr_with_sequential_merges,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P0
    test_pitr_with_ttl_and_deletions,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P0
    test_pitr_concurrent_backup_and_restore,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P0
    test_pitr_before_collection_drop,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P0
    test_pitr_history_retention_window_boundary,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P0

    # -----------------------------------------------------------------------
    # P1 — Merge variants, schema-change, retention, multi-bucket, durability,
    #       and subdoc PITR tests
    # 16 tests — paired with P0 job for balanced CI throughput
    # -----------------------------------------------------------------------

    # Merge variants
    test_pitr_with_merge_specific_range,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P1
    test_pitr_with_merge_containing_full_backup,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P1
    test_pitr_sequential_restore_after_merge,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P1
    test_pitr_haphazard_restore_after_merge,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P1
    test_pitr_with_remove_range,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P1

    # Filtering, flush, and param changes
    test_pitr_bucket_flush,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P1
    test_pitr_with_filtering,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P1
    test_pitr_param_changes,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P1

    # Schema-change tests (scope drop & collection drop/recreate)
    test_pitr_before_scope_drop,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P1
    test_pitr_collection_drop_and_recreate,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P1

    # History retention boundary variant
    test_pitr_history_retention_seconds_change,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P1

    # Multi-bucket independent PITR tests (multi_bucket.continuous_backup_tests spec)
    test_pitr_multiple_buckets_simultaneous,cont_bkp_test=NFS,nodes_init=4,bucket_spec=multi_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P1
    test_pitr_multiple_buckets_different_intervals,cont_bkp_test=NFS,nodes_init=4,bucket_spec=multi_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=3,GROUP=P1

    # Durability-level PITR tests (requires >= 3 KV nodes)
    test_pitr_with_majority_durability,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P1
    test_pitr_with_persist_to_majority_durability,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P1

    # Subdocument mutation PITR test
    test_pitr_with_subdoc_mutations,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P1

    # -----------------------------------------------------------------------
    # P2 — Edge-case and defensive PITR tests
    #
    # Invalid timestamps, historyRetentionBytes pressure, active compression.
    # All run against a single Magma bucket.
    # -----------------------------------------------------------------------
    test_pitr_invalid_timestamp_handling,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P2
    test_pitr_history_retention_bytes_limit,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P2
    test_pitr_with_active_compression,cont_bkp_test=NFS,nodes_init=4,bucket_spec=single_bucket.continuous_backup_tests,data_spec_name=initial_load,continuous_backup_enabled=True,continuous_backup_interval=2,GROUP=P2
