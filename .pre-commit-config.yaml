# Pre-commit hooks for TAF (local only - no network access needed)
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Local hooks only - no external dependencies
  - repo: local
    hooks:
      # Run unit tests before commit/amend - blocks commit on failure
      - id: unit-test
        name: Run unit tests
        entry: "bash -c 'make unit_test || { echo ERROR: Unit tests failed. Commit blocked; exit 1; }'"
        language: system
        pass_filenames: false
        always_run: true

      # Lint with ruff (requires: pip install ruff)
      - id: ruff
        name: Ruff linter
        entry: "bash -c 'python3 -m ruff check --fix . || true'"
        language: system
        types: [python]
        pass_filenames: false

      # Format with ruff (requires: pip install ruff)
      - id: ruff-format
        name: Ruff formatter
        entry: "bash -c 'python3 -m ruff format --check . || true'"
        language: system
        types: [python]
        pass_filenames: false

      # Type check with mypy (requires: pip install mypy)
      # Uses gradual typing - won't fail on existing non-typed code
      - id: mypy
        name: Mypy type checker
        entry: "bash -c 'python3 -m mypy . --config-file pyproject.toml || true'"
        language: system
        types: [python]
        pass_filenames: false

      # Check for large files
      - id: check-large-files
        name: Check for large files
        entry: "bash -c 'find . -type f -size +1M -not -path \"./.git/*\" -not -path \"./DocLoader/*\" -not -path \"./sirius/*\" -not -path \"./lib/capellaAPI/*\" -exec ls -lh {} \\; -exec exit 1 \\;'"
        language: system
        pass_filenames: false

      # Detect merge conflicts
      - id: check-merge-conflict
        name: Check for merge conflicts
        entry: "bash -c 'grep -r \"^<<<<<<< \" . --include=\"*.py\" --include=\"*.yaml\" --include=\"*.json\" && exit 1 || exit 0'"
        language: system
        pass_filenames: false

      # AGENTS.md validation
      - id: validate-agents-md
        name: Validate AGENTS.md
        entry: "bash -c 'test -f AGENTS.md && test $(wc -c < AGENTS.md) -gt 100 && grep -q \"## Purpose\" AGENTS.md && echo AGENTS.md validated'"
        language: system
        files: 'AGENTS.md'
        pass_filenames: false
